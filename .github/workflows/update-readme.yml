name: Auto-update README

on:
  push:
    paths:
      - 'collections/*.json'

jobs:
  update-readme:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run generation script
        run: powershell -ExecutionPolicy Bypass -File .\docs\generate_readme.ps1
      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: Auto-update README table" || echo "No changes to commit"
          git push
